<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHZZK Memo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>CHZZK Memo</h1>
      <p class="hint">
        치지직에서 저장한 메모·카테고리를 스트리머·세션별로 관리하고, 기록을 수정·삭제하거나 TXT로 복사·보내기·가져오기 할 수 있습니다.
      </p>

      <section class="panel-block">
        <h2 class="section-title">메모 단축키</h2>
        <p class="hint small">
          「키 조합 입력」을 누른 뒤 단축키를 한 번 누릅니다. 수정 키 없이 한 글자만 지정할 수도 있습니다. 방향키·K·스페이스·M·T·F·J는 치지직 기본 조작과 겹쳐 지정할 수 없습니다. Esc로 취소합니다.
        </p>
        <div class="hotkey-display" id="hk-display">—</div>
        <div class="actions tight hotkey-actions">
          <button type="button" id="hk-capture" class="btn-secondary">키 조합 입력</button>
          <button type="button" id="save-hotkey-btn">저장</button>
          <span id="hotkey-saved" class="saved-msg" hidden>저장됨</span>
        </div>
        <p class="hk-status" id="hk-status" aria-live="polite"></p>
      </section>

      <label class="field-label" for="streamer-select">스트리머</label>
      <div class="select-wrap">
        <select id="streamer-select"></select>
      </div>

      <label class="field-label" for="session-select">세션 (방송 제목만 표시)</label>
      <div class="session-row">
        <div class="select-wrap">
          <select id="session-select"></select>
        </div>
        <button type="button" id="delete-session-btn" class="btn-danger">세션 삭제</button>
      </div>

      <p class="preview-label">기록 목록</p>
      <div class="entry-sort-row">
        <label><input type="checkbox" id="sort-desc" /> 늦은순</label>
        <label><input type="checkbox" id="sort-asc" checked /> 빠른순</label>
      </div>
      <div id="entry-list" class="entry-list"></div>

      <div class="actions">
        <button id="copy-btn">Copy</button>
        <button id="export-btn">TXT Export</button>
        <button id="import-btn">TXT Import</button>
        <input id="import-file" type="file" accept=".txt,text/plain" hidden />
      </div>

      <section class="project-links" aria-label="프로젝트 링크">
        <p class="project-links-title">프로젝트 / 문의</p>
        <p class="project-links-row">
          <a href="https://github.com/wny0320/Chzzk_Memo" target="_blank" rel="noopener noreferrer">GitHub 저장소</a>
          <span aria-hidden="true">·</span>
          <a href="https://github.com/wny0320/Chzzk_Memo/issues" target="_blank" rel="noopener noreferrer">이슈 목록</a>
          <span aria-hidden="true">·</span>
          <a href="https://github.com/wny0320/Chzzk_Memo/issues/new" target="_blank" rel="noopener noreferrer">이슈 등록</a>
        </p>
      </section>
    </main>

    <div id="cmm-confirm-modal" class="cmm-modal-overlay" hidden>
      <div class="cmm-modal" role="dialog" aria-modal="true" aria-labelledby="cmm-confirm-message">
        <p id="cmm-confirm-message" class="cmm-modal-message"></p>
        <div class="cmm-modal-actions">
          <button type="button" id="cmm-confirm-cancel" class="btn-secondary">취소</button>
          <button type="button" id="cmm-confirm-ok" class="btn-danger">삭제</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
