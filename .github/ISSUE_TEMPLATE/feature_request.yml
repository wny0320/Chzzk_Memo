name: Feature request
description: 기능 제안/개선 요청
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 제안 배경
      description: 어떤 불편을 해결하고 싶은지 작성해 주세요.
      placeholder: 긴 VOD에서 특정 마커를 더 쉽게 찾고 싶습니다.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작을 구체적으로 적어주세요.
      placeholder: 마커 목록에 검색 필터를 추가해 주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안/참고사항 (선택)
      description: 고려했던 다른 방식이나 참고 링크
  - type: textarea
    id: scope
    attributes:
      label: 영향 범위 (선택)
      description: 어떤 페이지/기능에 영향이 있는지
